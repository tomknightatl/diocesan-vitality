apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: usccb

resources:
  - ../../base

# Use 'labels' instead of deprecated 'commonLabels'
labels:
  - pairs:
      environment: prod
      app.kubernetes.io/part-of: usccb
      app.kubernetes.io/managed-by: argocd
    includeSelectors: true
    includeTemplates: true

images:
  - name: tomatl/usccb
    newTag: backend-latest
  - name: tomatl/usccb
    newTag: frontend-latest