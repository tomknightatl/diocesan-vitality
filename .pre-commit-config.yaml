# Pre-commit configuration for Diocesan Vitality
# EXACTLY matches the Simple CI pipeline for consistency
# Install with: pip install pre-commit && pre-commit install

repos:
  # Core Python Code Quality - MATCHES Simple CI exactly
  - repo: https://github.com/psf/black
    rev: 24.8.0
    hooks:
      - id: black
        # No args - reads from pyproject.toml like CI does
        language_version: python3

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        # No args - reads from pyproject.toml like CI does

  - repo: https://github.com/pycqa/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        # No args - reads from .flake8 like CI does

  # Additional Local-Only Quality Checks (not in CI)
  # These provide extra value during development but aren't CI blockers

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: debug-statements

  # Security scan (local development aid)
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        args: [-r, ., --skip, B101, B601]
        exclude: ^(tests/|scripts/ci_check\.py)

  # Frontend linting (when applicable)
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.9.1
    hooks:
      - id: eslint
        files: ^frontend/.*\.(js|jsx|ts|tsx)$
        additional_dependencies:
          - eslint@9.9.1
          - eslint-config-react-app
        args: [--fix]

# Configuration
default_stages: [pre-commit]
fail_fast: false
minimum_pre_commit_version: 3.0.0
# CI Parity Notes:
# - Black, isort, flake8 run EXACTLY like Simple CI workflow
# - Additional hooks provide development value without breaking CI parity
# - If Simple CI workflow changes, update the corresponding hooks here
