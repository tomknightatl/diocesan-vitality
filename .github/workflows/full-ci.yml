name: Full CI/CD Pipeline
# Comprehensive testing and validation pipeline
# SUCCESS of this workflow triggers Multi-Cluster deployment

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop, staging]

env:
  REGISTRY: docker.io
  IMAGE_NAMESPACE: tomatl/diocesan-vitality

jobs:
  # ============================================================================
  # STAGE 1: CODE QUALITY & STATIC ANALYSIS
  # ============================================================================
  code-quality:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort mypy pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Install Frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Python Code Formatting (Black)
        run: |
          black --check --diff .
          echo "✅ Python code formatting passed"

      - name: Python Import Sorting (isort)
        run: |
          isort --check-only --diff .
          echo "✅ Python import sorting passed"

      - name: Python Linting (Flake8)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --statistics
          echo "✅ Python linting passed"

      - name: Frontend Linting (ESLint)
        run: |
          cd frontend
          npm run lint
          echo "✅ Frontend linting passed"

      - name: Python Type Checking (MyPy)
        continue-on-error: true
        run: |
          # Install type stubs and run mypy with proper exclusions
          python -m pip install types-requests
          # Run mypy only on core directories, exclude src/ packaging structure
          mypy core/ extractors/ --ignore-missing-imports --config-file pyproject.toml || true
          echo "⚠️ Type checking completed (warnings allowed)"

  # ============================================================================
  # STAGE 2: PARALLEL UNIT TESTS
  # ============================================================================
  test-backend-core:
    name: Backend Tests - Core Components
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio pytest-timeout pytest-mock
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Core Component Tests
        env:
          TESTING: true
          GENAI_API_KEY: ${{ secrets.GENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          # Core component tests - fast, independent
          pytest tests/test_core.py tests/test_utils.py tests/test_circuit_breaker.py tests/test_deduplication.py tests/test_parish_validation.py tests/test_extractors.py -v --cov=core --cov=extractors --cov-report=xml --cov-report=term-missing --timeout=60
          echo "✅ Core component tests passed"

  test-backend-integration:
    name: Backend Tests - Integration & External
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio pytest-timeout pytest-mock
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Integration & External Tests
        env:
          TESTING: true
          GENAI_API_KEY: ${{ secrets.GENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          # Integration and external service tests
          pytest tests/test_integration.py tests/test_monitoring.py tests/test_dashboard.py tests/test_dead_mans_switch.py tests/test_parish_url_consistency.py -v --cov=core --cov=extractors --cov-report=xml --cov-report=term-missing --timeout=90
          echo "✅ Integration & external tests passed"

  test-backend-ai-async:
    name: Backend Tests - AI & Async Logic
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio pytest-timeout pytest-mock
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run AI & Async Logic Tests
        env:
          TESTING: true
          GENAI_API_KEY: ${{ secrets.GENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          # AI and async logic tests - potentially slower
          pytest tests/test_ai_fallback_extractor.py tests/test_ai_schedule_extraction.py tests/test_async_logic.py tests/test_async_extraction.py tests/test_optimizations.py tests/test_schedule_keywords.py -v --cov=core --cov=extractors --cov-report=xml --cov-report=term-missing --timeout=120
          echo "✅ AI & async logic tests passed"

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Frontend Tests
        run: |
          cd frontend
          # Run Vitest tests
          npm run test:run
          echo "✅ Frontend tests completed"

  # ============================================================================
  # STAGE 3: INTEGRATION TESTS
  # ============================================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs:
      [
        test-backend-core,
        test-backend-integration,
        test-backend-ai-async,
        test-frontend,
      ]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio pytest-timeout pytest-mock psycopg2-binary
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Set up test database
        env:
          PGPASSWORD: postgres
        run: |
          sleep 5
          psql -h localhost -U postgres -c "SELECT 1 FROM pg_database WHERE datname='test_db';" | grep -q 1 || \
          psql -h localhost -U postgres -c "CREATE DATABASE test_db;"
          psql -h localhost -U postgres -d test_db -c "
            CREATE TABLE IF NOT EXISTS test_connection (
              id SERIAL PRIMARY KEY,
              name VARCHAR(100),
              created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
            );
            INSERT INTO test_connection (name) VALUES ('integration_test');
          "
          echo "✅ Test database initialized"

      - name: Run Integration Tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          TESTING: true
          GENAI_API_KEY: ${{ secrets.GENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          pytest tests/test_integration.py -v --cov=core --cov=extractors --cov-report=xml --cov-report=term-missing
          echo "✅ Integration tests passed"

  # ============================================================================
  # STAGE 4: BUILD DOCKER IMAGES (FOR BRANCHES)
  # ============================================================================
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [integration-tests]
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main'
    outputs:
      backend-tag: ${{ steps.meta.outputs.backend-tag }}
      frontend-tag: ${{ steps.meta.outputs.frontend-tag }}
      pipeline-tag: ${{ steps.meta.outputs.pipeline-tag }}
      environment: ${{ steps.meta.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate tags
        id: meta
        run: |
          BRANCH=$(echo ${GITHUB_REF#refs/heads/} | sed 's/[^a-zA-Z0-9]/-/g')
          TIMESTAMP=$(date +%Y-%m-%d-%H-%M-%S)

          case "$BRANCH" in
            "develop")
              ENV="dev"
              ;;
            "staging")
              ENV="staging"
              ;;
            "main")
              ENV="prod"
              ;;
            *)
              ENV="dev"
              ;;
          esac

          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "backend-tag=${{ env.IMAGE_NAMESPACE }}:${ENV}-backend-${TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "frontend-tag=${{ env.IMAGE_NAMESPACE }}:${ENV}-frontend-${TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "pipeline-tag=${{ env.IMAGE_NAMESPACE }}:${ENV}-pipeline-${TIMESTAMP}" >> $GITHUB_OUTPUT

      - name: Mock Docker builds (no registry push)
        run: |
          echo "🐳 Mock building Docker images..."
          echo "Would build:"
          echo "  Backend: ${{ steps.meta.outputs.backend-tag }}"
          echo "  Frontend: ${{ steps.meta.outputs.frontend-tag }}"
          echo "  Pipeline: ${{ steps.meta.outputs.pipeline-tag }}"
          echo "✅ Mock build completed"

  # ============================================================================
  # STAGE 5: DEPLOYMENT VALIDATION
  # ============================================================================
  deployment-validation:
    name: Deployment Validation
    runs-on: ubuntu-latest
    needs: [build-images]
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/staging'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment configuration
        env:
          ENVIRONMENT: ${{ needs.build-images.outputs.environment }}
        run: |
          echo "🔍 Validating ${ENVIRONMENT} deployment configuration..."

          # Check if docker-compose file exists
          if [ -f "docker-compose.${ENVIRONMENT}.yml" ]; then
            echo "✅ Docker Compose file exists: docker-compose.${ENVIRONMENT}.yml"
          else
            echo "⚠️ Docker Compose file not found: docker-compose.${ENVIRONMENT}.yml"
          fi

          # Validate environment-specific configs
          echo "📦 Would deploy images:"
          echo "   Backend: ${{ needs.build-images.outputs.backend-tag }}"
          echo "   Frontend: ${{ needs.build-images.outputs.frontend-tag }}"
          echo "   Pipeline: ${{ needs.build-images.outputs.pipeline-tag }}"

          echo "✅ Deployment validation completed"

  # ============================================================================
  # STAGE 6: FINAL VALIDATION
  # ============================================================================
  pipeline-summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs:
      [
        code-quality,
        test-backend-core,
        test-backend-integration,
        test-backend-ai-async,
        test-frontend,
        integration-tests,
        build-images,
      ]
    if: always()
    steps:
      - name: Pipeline Results
        run: |
          echo "🎯 CI/CD Pipeline Summary"
          echo "========================="
          echo ""
          echo "📊 Job Results:"
          echo "   Code Quality: ${{ needs.code-quality.result }}"
          echo "   Backend Tests - Core: ${{ needs.test-backend-core.result }}"
          echo "   Backend Tests - Integration: ${{ needs.test-backend-integration.result }}"
          echo "   Backend Tests - AI/Async: ${{ needs.test-backend-ai-async.result }}"
          echo "   Frontend Tests: ${{ needs.test-frontend.result }}"
          echo "   Integration Tests: ${{ needs.integration-tests.result }}"
          echo "   Build Images: ${{ needs.build-images.result }}"
          echo ""

          # Check if all critical jobs passed
          if [[ "${{ needs.code-quality.result }}" == "success" && \
                "${{ needs.test-backend-core.result }}" == "success" && \
                "${{ needs.test-backend-integration.result }}" == "success" && \
                "${{ needs.test-backend-ai-async.result }}" == "success" && \
                "${{ needs.integration-tests.result }}" == "success" ]]; then
            echo "✅ All critical checks passed!"
            echo "🚀 Code is ready for deployment"
            echo "💡 Multi-Cluster CI/CD Pipeline will be triggered automatically"
          else
            echo "❌ Some critical checks failed"
            echo "🔧 Please review and fix issues before deployment"
            echo "⏸️  Multi-Cluster deployment will be skipped"
            exit 1
          fi
