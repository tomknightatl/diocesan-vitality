name: Full CI/CD Pipeline
# Comprehensive testing and validation pipeline
# SUCCESS of this workflow triggers Multi-Cluster deployment

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop, staging]

env:
  REGISTRY: docker.io
  IMAGE_NAMESPACE: tomatl/diocesan-vitality

jobs:
  # ============================================================================
  # STAGE 1: CODE QUALITY & STATIC ANALYSIS
  # ============================================================================
  code-quality:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort mypy pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Install Frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Python Code Formatting (Black)
        run: |
          black --check --diff .
          echo "✅ Python code formatting passed"

      - name: Python Import Sorting (isort)
        run: |
          isort --check-only --diff .
          echo "✅ Python import sorting passed"

      - name: Python Linting (Flake8)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --statistics
          echo "✅ Python linting passed"

      - name: Frontend Linting (ESLint)
        run: |
          cd frontend
          npm run lint
          echo "✅ Frontend linting passed"

      - name: Python Type Checking (MyPy)
        continue-on-error: true
        run: |
          # Install type stubs and run mypy with proper exclusions
          python -m pip install types-requests
          # Run mypy only on core directories, exclude src/ packaging structure
          mypy core/ extractors/ --ignore-missing-imports --config-file pyproject.toml || true
          echo "⚠️ Type checking completed (warnings allowed)"

  # ============================================================================
  # STAGE 2: UNIT TESTS
  # ============================================================================
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio pytest-timeout
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Create test directory if not exists
        run: |
          if [ ! -d "tests" ]; then
            mkdir -p tests
            cat > tests/test_basic.py << 'EOF'
          import sys
          import os
          sys.path.append(os.path.dirname(os.path.dirname(os.path.abspath(__file__))))

          def test_imports():
              """Test basic imports work"""
              try:
                  import core.logger
                  import core.db_batch_operations
                  assert True
              except ImportError:
                  assert False, "Core imports failed"

          def test_environment():
              """Test environment is properly set"""
              assert os.getenv('TESTING') == 'true'
          EOF
          fi

      - name: Run Backend Unit Tests
        env:
          TESTING: true
        run: |
          # Run fast tests only by default, exclude slow/webdriver/network tests
          pytest tests/ -v --cov=core --cov=extractors --cov-report=xml --cov-report=term -m "not slow and not webdriver and not network" --timeout=120
          echo "✅ Backend tests passed"

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Frontend Tests
        run: |
          cd frontend
          # Skip tests if no test files exist
          if [ -f "src/App.test.js" ] || [ -f "src/App.test.tsx" ]; then
            npm test -- --coverage --watchAll=false
          else
            echo "⚠️ No frontend tests found, skipping"
          fi
          echo "✅ Frontend tests completed"

  # ============================================================================
  # STAGE 3: INTEGRATION TESTS
  # ============================================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio psycopg2-binary
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Set up test database
        env:
          PGPASSWORD: postgres
        run: |
          sleep 5
          psql -h localhost -U postgres -c "SELECT 1 FROM pg_database WHERE datname='test_db';" | grep -q 1 || \
          psql -h localhost -U postgres -c "CREATE DATABASE test_db;"
          psql -h localhost -U postgres -d test_db -c "
            CREATE TABLE IF NOT EXISTS test_connection (
              id SERIAL PRIMARY KEY,
              name VARCHAR(100),
              created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
            );
            INSERT INTO test_connection (name) VALUES ('integration_test');
          "
          echo "✅ Test database initialized"

      - name: Create integration tests if not exist
        run: |
          if [ ! -f "tests/test_integration.py" ]; then
            cat > tests/test_integration.py << 'EOF'
          import pytest
          import os

          def test_database_connection():
              """Test database connectivity"""
              db_url = os.getenv('DATABASE_URL')
              assert db_url is not None
              assert 'postgresql' in db_url

          def test_environment_variables():
              """Test required environment variables"""
              assert os.getenv('TESTING') == 'true'
          EOF
          fi

      - name: Run Integration Tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          TESTING: true
        run: |
          pytest tests/test_integration.py -v
          echo "✅ Integration tests passed"

  # ============================================================================
  # STAGE 4: BUILD DOCKER IMAGES (FOR BRANCHES)
  # ============================================================================
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [integration-tests]
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main'
    outputs:
      backend-tag: ${{ steps.meta.outputs.backend-tag }}
      frontend-tag: ${{ steps.meta.outputs.frontend-tag }}
      pipeline-tag: ${{ steps.meta.outputs.pipeline-tag }}
      environment: ${{ steps.meta.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate tags
        id: meta
        run: |
          BRANCH=$(echo ${GITHUB_REF#refs/heads/} | sed 's/[^a-zA-Z0-9]/-/g')
          TIMESTAMP=$(date +%Y-%m-%d-%H-%M-%S)

          case "$BRANCH" in
            "develop")
              ENV="dev"
              ;;
            "staging")
              ENV="staging"
              ;;
            "main")
              ENV="prod"
              ;;
            *)
              ENV="dev"
              ;;
          esac

          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "backend-tag=${{ env.IMAGE_NAMESPACE }}:${ENV}-backend-${TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "frontend-tag=${{ env.IMAGE_NAMESPACE }}:${ENV}-frontend-${TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "pipeline-tag=${{ env.IMAGE_NAMESPACE }}:${ENV}-pipeline-${TIMESTAMP}" >> $GITHUB_OUTPUT

      - name: Mock Docker builds (no registry push)
        run: |
          echo "🐳 Mock building Docker images..."
          echo "Would build:"
          echo "  Backend: ${{ steps.meta.outputs.backend-tag }}"
          echo "  Frontend: ${{ steps.meta.outputs.frontend-tag }}"
          echo "  Pipeline: ${{ steps.meta.outputs.pipeline-tag }}"
          echo "✅ Mock build completed"

  # ============================================================================
  # STAGE 5: DEPLOYMENT VALIDATION
  # ============================================================================
  deployment-validation:
    name: Deployment Validation
    runs-on: ubuntu-latest
    needs: [build-images]
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/staging'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment configuration
        env:
          ENVIRONMENT: ${{ needs.build-images.outputs.environment }}
        run: |
          echo "🔍 Validating ${ENVIRONMENT} deployment configuration..."

          # Check if docker-compose file exists
          if [ -f "docker-compose.${ENVIRONMENT}.yml" ]; then
            echo "✅ Docker Compose file exists: docker-compose.${ENVIRONMENT}.yml"
          else
            echo "⚠️ Docker Compose file not found: docker-compose.${ENVIRONMENT}.yml"
          fi

          # Validate environment-specific configs
          echo "📦 Would deploy images:"
          echo "   Backend: ${{ needs.build-images.outputs.backend-tag }}"
          echo "   Frontend: ${{ needs.build-images.outputs.frontend-tag }}"
          echo "   Pipeline: ${{ needs.build-images.outputs.pipeline-tag }}"

          echo "✅ Deployment validation completed"

  # ============================================================================
  # STAGE 6: FINAL VALIDATION
  # ============================================================================
  pipeline-summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs:
      [
        code-quality,
        test-backend,
        test-frontend,
        integration-tests,
        build-images,
      ]
    if: always()
    steps:
      - name: Pipeline Results
        run: |
          echo "🎯 CI/CD Pipeline Summary"
          echo "========================="
          echo ""
          echo "📊 Job Results:"
          echo "   Code Quality: ${{ needs.code-quality.result }}"
          echo "   Backend Tests: ${{ needs.test-backend.result }}"
          echo "   Frontend Tests: ${{ needs.test-frontend.result }}"
          echo "   Integration Tests: ${{ needs.integration-tests.result }}"
          echo "   Build Images: ${{ needs.build-images.result }}"
          echo ""

          # Check if all critical jobs passed
          if [[ "${{ needs.code-quality.result }}" == "success" && \
                "${{ needs.test-backend.result }}" == "success" && \
                "${{ needs.integration-tests.result }}" == "success" ]]; then
            echo "✅ All critical checks passed!"
            echo "🚀 Code is ready for deployment"
            echo "💡 Multi-Cluster CI/CD Pipeline will be triggered automatically"
          else
            echo "❌ Some critical checks failed"
            echo "🔧 Please review and fix issues before deployment"
            echo "⏸️  Multi-Cluster deployment will be skipped"
            exit 1
          fi
