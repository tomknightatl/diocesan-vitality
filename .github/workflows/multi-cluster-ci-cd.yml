name: Multi-Cluster CI/CD Pipeline
# Optimized deployment pipeline that depends on Full CI/CD success
# Focuses purely on deployment after validation is complete

on:
  # Trigger after successful Full CI/CD Pipeline
  workflow_run:
    workflows: ["Full CI/CD Pipeline"]
    types:
      - completed
    branches: [main, develop]

  # Manual deployment trigger
  workflow_dispatch:
    inputs:
      target_cluster:
        description: "Target cluster for deployment"
        required: true
        default: "development"
        type: choice
        options:
          - development
          - staging
          - production
      force_deploy:
        description: "Skip Full CI/CD dependency check"
        required: false
        default: false
        type: boolean

env:
  REGISTRY: docker.io
  IMAGE_NAMESPACE: tomatl/diocesan-vitality

jobs:
  # ============================================================================
  # PREREQUISITE CHECK
  # ============================================================================
  check-prerequisites:
    name: Check Prerequisites
    runs-on: ubuntu-latest
    outputs:
      should-proceed: ${{ steps.check.outputs.should-proceed }}
      target-env: ${{ steps.env.outputs.target-env }}
    steps:
      - name: Check Full CI/CD success
        id: check
        run: |
          # Skip check if force deploy is enabled
          if [ "${{ github.event.inputs.force_deploy }}" = "true" ]; then
            echo "⚡ Force deploy enabled - skipping Full CI/CD check"
            echo "should-proceed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # For workflow_run trigger, check if Full CI/CD succeeded
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            if [ "${{ github.event.workflow_run.conclusion }}" = "success" ]; then
              echo "✅ Full CI/CD Pipeline succeeded - proceeding with deployment"
              echo "should-proceed=true" >> $GITHUB_OUTPUT
            else
              echo "❌ Full CI/CD Pipeline failed - skipping deployment"
              echo "should-proceed=false" >> $GITHUB_OUTPUT
            fi
          else
            # Manual trigger - assume tests passed or will be forced
            echo "🔧 Manual trigger - proceeding with deployment"
            echo "should-proceed=true" >> $GITHUB_OUTPUT
          fi

      - name: Determine target environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET_ENV="${{ github.event.inputs.target_cluster }}"
          elif [ "${{ github.ref }}" = "refs/heads/develop" ] || [ "${{ github.event.workflow_run.head_branch }}" = "develop" ]; then
            TARGET_ENV="development"
          elif [ "${{ github.ref }}" = "refs/heads/main" ] || [ "${{ github.event.workflow_run.head_branch }}" = "main" ]; then
            TARGET_ENV="staging"
          else
            TARGET_ENV="development"  # Default fallback
          fi

          echo "target-env=$TARGET_ENV" >> $GITHUB_OUTPUT
          echo "🎯 Target environment: $TARGET_ENV"

  # ============================================================================
  # BUILD DEPLOYMENT IMAGES
  # ============================================================================
  build-deployment-images:
    name: Build Deployment Images
    runs-on: ubuntu-latest
    needs: check-prerequisites
    if: needs.check-prerequisites.outputs.should-proceed == 'true'
    outputs:
      backend-tag: ${{ steps.meta.outputs.backend-tag }}
      frontend-tag: ${{ steps.meta.outputs.frontend-tag }}
      pipeline-tag: ${{ steps.meta.outputs.pipeline-tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate deployment tags
        id: meta
        run: |
          TIMESTAMP=$(date +%Y-%m-%d-%H-%M-%S)
          ENV="${{ needs.check-prerequisites.outputs.target-env }}"

          echo "backend-tag=${{ env.IMAGE_NAMESPACE }}:${ENV}-backend-${TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "frontend-tag=${{ env.IMAGE_NAMESPACE }}:${ENV}-frontend-${TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "pipeline-tag=${{ env.IMAGE_NAMESPACE }}:${ENV}-pipeline-${TIMESTAMP}" >> $GITHUB_OUTPUT

      - name: Build and push deployment images
        run: |
          echo "🏗️ Building deployment images for ${{ needs.check-prerequisites.outputs.target-env }}"

          # Backend
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file backend/Dockerfile \
            --tag ${{ steps.meta.outputs.backend-tag }} \
            --label deployment.environment=${{ needs.check-prerequisites.outputs.target-env }} \
            --label deployment.timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            --push backend/

          # Frontend
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file frontend/Dockerfile \
            --tag ${{ steps.meta.outputs.frontend-tag }} \
            --label deployment.environment=${{ needs.check-prerequisites.outputs.target-env }} \
            --label deployment.timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            --push frontend/

          # Pipeline
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file Dockerfile.pipeline \
            --tag ${{ steps.meta.outputs.pipeline-tag }} \
            --label deployment.environment=${{ needs.check-prerequisites.outputs.target-env }} \
            --label deployment.timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            --push .

          echo "✅ Deployment images built and pushed"

  # ============================================================================
  # DEPLOY TO DEVELOPMENT
  # ============================================================================
  deploy-development:
    name: Deploy to Development Cluster
    runs-on: ubuntu-latest
    needs: [check-prerequisites, build-deployment-images]
    if: needs.check-prerequisites.outputs.target-env == 'development' && needs.check-prerequisites.outputs.should-proceed == 'true'
    environment: development
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to development cluster
        env:
          BACKEND_IMAGE: ${{ needs.build-deployment-images.outputs.backend-tag }}
          FRONTEND_IMAGE: ${{ needs.build-deployment-images.outputs.frontend-tag }}
          PIPELINE_IMAGE: ${{ needs.build-deployment-images.outputs.pipeline-tag }}
        run: |
          echo "🚀 Deploying to Development Cluster"
          echo "   Backend: $BACKEND_IMAGE"
          echo "   Frontend: $FRONTEND_IMAGE"
          echo "   Pipeline: $PIPELINE_IMAGE"

          # Update development manifests
          find k8s/environments/development -name "*.yaml" -type f | while read -r file; do
            sed -i "s|image: tomatl/diocesan-vitality:.*backend.*|image: $BACKEND_IMAGE|g" "$file"
            sed -i "s|image: tomatl/diocesan-vitality:.*frontend.*|image: $FRONTEND_IMAGE|g" "$file"
            sed -i "s|image: tomatl/diocesan-vitality:.*pipeline.*|image: $PIPELINE_IMAGE|g" "$file"
          done

          echo "✅ Development deployment completed"

  # ============================================================================
  # DEPLOY TO STAGING
  # ============================================================================
  deploy-staging:
    name: Deploy to Staging Cluster
    runs-on: ubuntu-latest
    needs: [check-prerequisites, build-deployment-images]
    if: needs.check-prerequisites.outputs.target-env == 'staging' && needs.check-prerequisites.outputs.should-proceed == 'true'
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to staging cluster
        env:
          BACKEND_IMAGE: ${{ needs.build-deployment-images.outputs.backend-tag }}
          FRONTEND_IMAGE: ${{ needs.build-deployment-images.outputs.frontend-tag }}
          PIPELINE_IMAGE: ${{ needs.build-deployment-images.outputs.pipeline-tag }}
        run: |
          echo "🚀 Deploying to Staging Cluster"
          echo "   Backend: $BACKEND_IMAGE"
          echo "   Frontend: $FRONTEND_IMAGE"
          echo "   Pipeline: $PIPELINE_IMAGE"

          # Update staging manifests
          find k8s/environments/staging -name "*.yaml" -type f | while read -r file; do
            sed -i "s|image: tomatl/diocesan-vitality:.*backend.*|image: $BACKEND_IMAGE|g" "$file"
            sed -i "s|image: tomatl/diocesan-vitality:.*frontend.*|image: $FRONTEND_IMAGE|g" "$file"
            sed -i "s|image: tomatl/diocesan-vitality:.*pipeline.*|image: $PIPELINE_IMAGE|g" "$file"
          done

          echo "✅ Staging deployment completed"

  # ============================================================================
  # DEPLOY TO PRODUCTION
  # ============================================================================
  deploy-production:
    name: Deploy to Production Cluster
    runs-on: ubuntu-latest
    needs: [check-prerequisites, build-deployment-images]
    if: needs.check-prerequisites.outputs.target-env == 'production' && needs.check-prerequisites.outputs.should-proceed == 'true'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Production deployment confirmation
        run: |
          echo "🚨 PRODUCTION DEPLOYMENT"
          echo "========================"
          echo ""
          echo "⚠️  This will deploy to PRODUCTION cluster"
          echo "🎯 Target: Production Kubernetes cluster"
          echo "📦 Images being deployed:"
          echo "   Backend: ${{ needs.build-deployment-images.outputs.backend-tag }}"
          echo "   Frontend: ${{ needs.build-deployment-images.outputs.frontend-tag }}"
          echo "   Pipeline: ${{ needs.build-deployment-images.outputs.pipeline-tag }}"
          echo ""
          echo "✅ Full CI/CD validation completed"
          echo "🚀 Proceeding with production deployment..."

      - name: Deploy to production cluster
        env:
          BACKEND_IMAGE: ${{ needs.build-deployment-images.outputs.backend-tag }}
          FRONTEND_IMAGE: ${{ needs.build-deployment-images.outputs.frontend-tag }}
          PIPELINE_IMAGE: ${{ needs.build-deployment-images.outputs.pipeline-tag }}
        run: |
          echo "🚀 Deploying to Production Cluster"

          # Update production manifests
          find k8s/environments/production -name "*.yaml" -type f | while read -r file; do
            sed -i "s|image: tomatl/diocesan-vitality:.*backend.*|image: $BACKEND_IMAGE|g" "$file"
            sed -i "s|image: tomatl/diocesan-vitality:.*frontend.*|image: $FRONTEND_IMAGE|g" "$file"
            sed -i "s|image: tomatl/diocesan-vitality:.*pipeline.*|image: $PIPELINE_IMAGE|g" "$file"
          done

          echo "✅ Production deployment completed"

  # ============================================================================
  # DEPLOYMENT SUMMARY
  # ============================================================================
  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs:
      [
        check-prerequisites,
        build-deployment-images,
        deploy-development,
        deploy-staging,
        deploy-production,
      ]
    if: always() && needs.check-prerequisites.outputs.should-proceed == 'true'
    steps:
      - name: Deployment summary
        run: |
          echo "🎯 MULTI-CLUSTER DEPLOYMENT SUMMARY"
          echo "===================================="
          echo ""
          echo "🏗️  Build Status: ${{ needs.build-deployment-images.result }}"
          echo "🚀 Target Environment: ${{ needs.check-prerequisites.outputs.target-env }}"
          echo ""
          echo "📦 Deployed Images:"
          echo "   Backend: ${{ needs.build-deployment-images.outputs.backend-tag }}"
          echo "   Frontend: ${{ needs.build-deployment-images.outputs.frontend-tag }}"
          echo "   Pipeline: ${{ needs.build-deployment-images.outputs.pipeline-tag }}"
          echo ""
          echo "🎯 Deployment Results:"
          if [ "${{ needs.check-prerequisites.outputs.target-env }}" = "development" ]; then
            echo "   Development: ${{ needs.deploy-development.result }}"
          elif [ "${{ needs.check-prerequisites.outputs.target-env }}" = "staging" ]; then
            echo "   Staging: ${{ needs.deploy-staging.result }}"
          elif [ "${{ needs.check-prerequisites.outputs.target-env }}" = "production" ]; then
            echo "   Production: ${{ needs.deploy-production.result }}"
          fi
          echo ""
          echo "✅ Multi-cluster deployment pipeline completed!"
          echo "💡 This workflow focused purely on deployment after Full CI/CD validation"
